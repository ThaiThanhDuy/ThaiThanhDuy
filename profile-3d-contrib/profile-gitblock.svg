<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="850" viewBox="0 0 1280 850"><style>* { font-family: "Ubuntu", "Helvetica", "Arial", sans-serif; }
.fill-fg { fill: #00000f; }
.stroke-fg { stroke: #00000f; }
.fill-bg { fill: #ffffff; }
.stroke-bg { stroke: #ffffff; }
.fill-strong { fill: #111133; }
.fill-weak { fill: gray; }
.stroke-weak { stroke: gray; }
.radar {
stroke-width: 4px;
stroke: #47a042;
fill: #47a042;
fill-opacity: 0.5;
}
.cont-top-bg-0 { fill: #f8f8f8; }
.cont-top-fg-0 { fill: #aaaaaa; }
.cont-right-bg-0 { fill: rgb(174, 174, 174); }
.cont-right-fg-0 { fill: rgb(119, 119, 119); }
.cont-left-bg-0 { fill: rgb(207, 207, 207); }
.cont-left-fg-0 { fill: rgb(142, 142, 142); }
.cont-top-bg-1 { fill: hsl(125, 52%, 50%); }
.cont-top-fg-1 { fill: hsl(125, 52%, 10%); }
.cont-right-bg-1 { fill: rgb(43, 136, 51); }
.cont-right-fg-1 { fill: rgb(9, 27, 10); }
.cont-left-bg-1 { fill: rgb(51, 162, 60); }
.cont-left-fg-1 { fill: rgb(10, 32, 12); }
.cont-top-bg-2 { fill: hsl(242, 100%, 65%); }
.cont-top-fg-2 { fill: hsl(242, 100%, 16%); }
.cont-right-bg-2 { fill: rgb(58, 54, 179); }
.cont-right-fg-2 { fill: rgb(2, 0, 57); }
.cont-left-bg-2 { fill: rgb(69, 64, 213); }
.cont-left-fg-2 { fill: rgb(2, 0, 68); }
.cont-top-bg-3 { fill: hsl(48, 100%, 50%); }
.cont-top-fg-3 { fill: hsl(48, 100%, 15%); }
.cont-right-bg-3 { fill: rgb(179, 143, 0); }
.cont-right-fg-3 { fill: rgb(54, 43, 0); }
.cont-left-bg-3 { fill: rgb(213, 171, 0); }
.cont-left-fg-3 { fill: rgb(64, 51, 0); }
.cont-top-bg-4 { fill: hsl(350, 100%, 50%); }
.cont-top-fg-4 { fill: hsl(350, 100%, 15%); }
.cont-right-bg-4 { fill: rgb(179, 0, 30); }
.cont-right-fg-4 { fill: rgb(54, 0, 9); }
.cont-left-bg-4 { fill: rgb(213, 0, 36); }
