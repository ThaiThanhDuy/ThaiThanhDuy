name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      # Bước 1: Khởi tạo tải mã nguồn repo (Đã sửa lỗi cú pháp ThaiThanhDuy)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Bước 2: Chạy Action sinh ảnh 3D từ chính chủ
      - name: Generate 3D Contrib
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      # Bước 3: Commit và Push thẳng vào nhánh main
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          if git commit -m "generated: update 3d contributions"; then
            git push
          fi
