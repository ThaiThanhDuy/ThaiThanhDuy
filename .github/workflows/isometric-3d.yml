name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate 3D Contrib
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          theme: github-dark
          style: theme

      # Bước xử lý hậu kỳ (Post-processing) bảo toàn cấu trúc XML
      - name: Remove Date/Time Text safely from SVG
        run: |
          if [ -d "profile-3d-contrib" ]; then
            echo "Safely removing date text without destroying XML structure..."
            # Chỉ thay thế chuỗi ngày tháng dạng YYYY-MM-DD / YYYY-MM-DD thành chuỗi rỗng
            sed -i -E 's/[0-9]{4}-[0-9]{2}-[0-9]{2} \/ [0-9]{4}-[0-9]{2}-[0-9]{2}//g' profile-3d-contrib/*.svg
          fi

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          if git commit -m "generated: safely remove date text from svg"; then
            git push
          fi
