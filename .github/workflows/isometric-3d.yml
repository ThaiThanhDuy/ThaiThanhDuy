name: Generate Isometric 3D Contributions

on:
  # Tự động chạy mỗi 24 giờ (vào lúc 00:00 UTC)
  schedule:
    - cron: "0 0 * * *"
  # Cho phép kích hoạt thủ công (Manual Trigger) từ tab Actions
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate 3D SVG
        uses: yoshi3868/isometric-github-profile@master
        with:
          # Thay thế bằng username chính xác của bạn
          github_user_name: ThaiThanhDuy
          # Kiểu hiển thị (Mặc định: classic hoặc flat)
          type: classic

      - name: Deploy to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output-3d
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
