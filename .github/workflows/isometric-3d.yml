name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate 3D Contrib
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          theme: github-dark
          style: theme
      # Bước xử lý hậu kỳ (Post-processing): Xóa thẻ text hiển thị ngày tháng năm trong SVG
      - name: Remove Date/Time Text from SVG
        run: |
          if [ -d "profile-3d-contrib" ]; then
            echo "Processing SVG files to remove date text..."
            # Lệnh sed tìm và xóa các dòng text có định dạng chứa ngày tháng năm (YYYY-MM-DD)
            sed -i -E '/<text[^>]*>[0-9]{4}-[0-9]{2}-[0-9]{2}/d' profile-3d-contrib/*.svg
          fi

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          if git commit -m "generated: remove date text from svg files"; then
            git push
          fi
